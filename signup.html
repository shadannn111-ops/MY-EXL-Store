<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXL Store - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .signup-container { background: white; border-radius: 20px; width: 550px; max-width: 100%; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; font-size: 32px; font-weight: bold; color: #2874f0; margin-bottom: 10px; }
        .logo span { color: #fb641b; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #2874f0; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .signup-btn { width: 100%; background: #fb641b; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-link { text-align: center; margin-top: 20px; color: #666; }
        .login-link a { color: #2874f0; text-decoration: none; font-weight: bold; }
        .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">EXL <span>Store</span></div>
        <h2>Create Account</h2>
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
        <form id="signupForm">
            <div class="form-row">
                <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Enter full name"></div>
                <div class="form-group"><label>Mobile</label><input type="tel" id="mobile" placeholder="10-digit mobile" maxlength="10"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="Enter email"></div>
                <div class="form-group"><label>Password *</label><input type="password" id="password" placeholder="Min 6 characters"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>City</label><input type="text" id="city" placeholder="e.g., Mumbai"></div>
                <div class="form-group"><label>State</label><input type="text" id="state" placeholder="e.g., Maharashtra"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Pincode</label><input type="text" id="pincode" placeholder="6-digit" maxlength="6"></div>
            </div>
            <div class="form-group"><label>Full Address</label><textarea id="address" rows="2" placeholder="House number, street, landmark"></textarea></div>
            <button type="submit" class="signup-btn">Create Account</button>
        </form>
        <div class="login-link">Already have an account? <a href="login.html">Login</a></div>
    </div>
    <script>
        const API_URL = 'http://localhost:3000/api';
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            const pincode = document.getElementById('pincode').value;
            const address = document.getElementById('address').value;
            
            if (!name || !email || !password) {
                document.getElementById('errorMsg').innerText = 'Name, Email and Password are required';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            
            // Password validation
            if (password.length < 6) {
                document.getElementById('errorMsg').innerText = 'Password must be at least 6 characters';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, mobile, password, city, state, pincode, address })
                });
                const data = await res.json();
                if (data.success) {
                    // Save user address details in localStorage for immediate use
                    localStorage.setItem('userAddress', JSON.stringify({
                        fullName: name,
                        mobile: mobile,
                        city: city || 'Mumbai',
                        state: state || 'Maharashtra',
                        pincode: pincode || '400001',
                        address: address || ''
                    }));
                    localStorage.setItem('userName', name);
                    localStorage.setItem('userMobile', mobile);
                    localStorage.setItem('userCity', city || 'Mumbai');
                    localStorage.setItem('userState', state || 'Maharashtra');
                    localStorage.setItem('userPincode', pincode || '400001');
                    
                    document.getElementById('successMsg').innerText = 'Account created! Redirecting to login...';
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    document.getElementById('errorMsg').innerText = data.message;
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = 'Server not running! Run: node server.js';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
